<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLE & STRIDE | Premium Footwear</title>
    <style>
        /* CSS STYLES */
        :root {
            --primary: #1a1a1a;
            --accent: #e63946;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--primary);
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--primary);
            margin-left: 20px;
            font-weight: 500;
        }

        .cart-btn {
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
        }

        /* Hero Section */
        .hero {
            background-color: var(--light);
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction: column;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        .cta-button {
            background-color: var(--accent);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .cta-button:hover {
            background-color: #c92a36;
        }
